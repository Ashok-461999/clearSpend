name: moneymate
description: Offline-first personal expense tracker.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1     # DI + state (composition root)
  isar: ^3.1.0+1               # local storage (Data layer only)
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3        # db file location
  intl: ^0.19.0                # money + date formatting
  fl_chart: ^1.2.0
  shared_preferences: ^2.3.3   # user settings persistence
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  csv: ^6.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/app_icon.png"
  background_color: "#2563EB"
  adaptive_icon_background: "#2563EB"

flutter:
  uses-material-design: true
